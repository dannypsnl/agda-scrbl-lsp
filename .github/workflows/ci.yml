name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check & compile
        run: npm run compile
      - name: Package (dry-run, verifies the .vsix builds)
        run: npx --yes @vscode/vsce package --out agda-scrbl.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: agda-scrbl-vsix
          path: agda-scrbl.vsix
